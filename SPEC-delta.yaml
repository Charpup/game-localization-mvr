delta_version: 0.3.0
change_id: deep-cleanup-main-batch8
change_type: historical-repair-archive-closeout
status: in_progress
intent:
  summary: >
    Physically archive the two historical repair-side utilities that were already
    downgraded to archive-candidate, while preserving retained production-dev baselines,
    keep-chain, M4, authority drift, and optional Metrics semantics unchanged.
  non_goals:
    - Reworking repair_loop.py, run_validation.py, or build_validation_set.py
    - Implementing true repair resume support
    - Making Metrics a blocking smoke gate
    - Adding wrappers or alias entrypoints for archived utilities
    - Physically cleaning repo-root src/scripts
    - Altering the keep-chain runtime contract
assertions:
  authority_zone: main_worktree/scripts
  compat_zone: src/scripts
  keep_chain:
    - llm_ping
    - normalize_guard
    - translate_llm
    - qa_hard
    - rehydrate_export
    - smoke_verify
  minimal_irreversible_core:
    - scripts/run_smoke_pipeline.py
    - scripts/runtime_adapter.py
    - scripts/smoke_issue_logger.py
    - scripts/m4_3_collect_coverage.py
    - scripts/m4_4_decision.py
    - tests/test_smoke_verify.py
    - tests/test_qa_hard.py
    - tests/test_normalize_segmentation.py
planned_controls:
  - Move repair_loop_v2.py and repair_checkpoint_gaps.py from scripts/ into _obsolete/repair_archive/ without retaining wrappers.
  - Add/adjust characterization tests so the current state asserts archive-complete rather than runtime presence.
  - Add a repair archive README plus a Batch 8 report that explains retained mainline paths and restore basis.
  - Keep authority drift at WARN(runtime_adapter only), keep Metrics optional, and keep M4 decision logic unchanged.
status_map:
  repair_loop_v2.py: archive-complete historical archived utility
  repair_checkpoint_gaps.py: archive-complete historical archived utility
  repair_loop.py: must-keep retained repair authority
  run_validation.py: must-keep retained validation baseline
  build_validation_set.py: must-keep retained validation baseline generator
  runtime_adapter.py: must-keep core
  metrics_aggregator.py: optional observability surface
blocked_zones:
  - gate/**
  - stress/**
  - ../src/scripts/**
risk_controls:
  - Keep-chain scripts remain untouched except for already-established optional Metrics wiring.
  - Retained validation and repair authority surfaces must not be modified beyond report/inventory references.
  - Governance artifacts must explain that repair_loop_v2.py and repair_checkpoint_gaps.py are archived historical utilities, not current tools.
  - authority report may remain WARN on runtime_adapter drift, but must not add required mirror drift.
  - M4 decision logic and smoke evidence generation remain unchanged.
