delta_version: 0.4.0
change_id: milestone-e-prepare-20260324
change_type: milestone-e-multi-market-delta-and-incremental-retranslation
status: in_progress
intent:
  summary: >
    Add a locale-generic typed delta engine and incremental retranslation task flow
    for milestone E, while keeping current ru-RU assets usable through a compatibility
    layer and preserving the existing keep-chain runtime contract.
  non_goals:
    - Building a GUI or dashboard in milestone E
    - Reopening earlier cleanup batches or changing authority-zone ownership
    - Hard-cutting all existing ru-RU specific assets in one migration
    - Changing smoke metrics from optional to blocking
assertions:
  authority_zone: main_worktree/scripts
  compat_zone: src/scripts
  keep_chain:
    - llm_ping
    - normalize_guard
    - translate_llm
    - qa_hard
    - rehydrate_export
    - smoke_verify
  minimal_irreversible_core:
    - scripts/run_smoke_pipeline.py
    - scripts/runtime_adapter.py
    - scripts/smoke_issue_logger.py
    - scripts/m4_3_collect_coverage.py
    - scripts/m4_4_decision.py
    - tests/test_smoke_verify.py
    - tests/test_qa_hard.py
    - tests/test_normalize_segmentation.py
planned_controls:
  - Freeze a single E contract source of truth in workflow/milestone_e_contract.yaml.
  - Standardize clean-worktree inputs for style profile and glossary authority.
  - Replace glossary-only impact detection with typed delta propagation and locale-aware row impacts.
  - Split refresh into task generation and task execution with post-run hard gates.
  - Keep authority drift policy, keep-chain behavior, and optional Metrics semantics unchanged.
status_map:
  ../src/scripts/**: compat-keep managed compatibility liability with closeout_decision separate-exit-program
  stress_test_3k_run.sh: must-keep canonical stress shell authority
  repair_loop.py: must-keep retained repair authority
  run_validation.py: must-keep retained validation baseline
  build_validation_set.py: must-keep retained validation baseline generator
  runtime_adapter.py: must-keep core
  metrics_aggregator.py: optional observability surface
blocked_zones:
  []
risk_controls:
  - Keep-chain scripts remain semantically unchanged while E adds parallel delta/task surfaces around them.
  - Locale-generic contracts must preserve backward readability of current ru-RU assets.
  - Executor outputs must preserve row count and placeholder signature integrity.
  - Clean-worktree execution must not depend on residual local data files.
  - Existing smoke evidence generation and authority policy remain intact while E adds new delta-run artifacts.
