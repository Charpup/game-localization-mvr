delta_version: 0.3.0
change_id: deep-cleanup-r3-roadmap-phase1
change_type: batch3-batch4-governance-and-audit
status: in_progress
intent:
  summary: >
    Finalize near-core auxiliary surface statuses, freeze high-risk cleanup zones behind
    explicit governance artifacts, and prepare the post-cleanup GitHub branch audit path
    without changing the smoke-chain runtime contract.
  non_goals:
    - Rewriting run_smoke_pipeline.py
    - Physically cleaning repo-root src/scripts
    - Touching repair, validation, gate, or stress implementation paths
    - Merging or deleting remote branches during this step
    - Physically deleting normalize or soft-QA files
assertions:
  authority_zone: main_worktree/scripts
  compat_zone: src/scripts
  keep_chain:
    - llm_ping
    - normalize_guard
    - translate_llm
    - qa_hard
    - rehydrate_export
    - smoke_verify
  minimal_irreversible_core:
    - scripts/run_smoke_pipeline.py
    - scripts/runtime_adapter.py
    - scripts/smoke_issue_logger.py
    - scripts/m4_3_collect_coverage.py
    - scripts/m4_4_decision.py
    - tests/test_smoke_verify.py
    - tests/test_qa_hard.py
    - tests/test_normalize_segmentation.py
planned_controls:
  - Lock Batch 3 statuses for normalize_* and soft QA surfaces in a dedicated inventory artifact.
  - Add CLI compatibility tests for qa_soft.py and normalize_ingest.py.
  - Produce a blocked-surface inventory for repair, validation, stress-like, and compat-mirror zones.
  - Produce a GitHub branch audit checklist without performing any remote cleanup.
status_map:
  normalize_ingest.py: compat-keep documented ingest
  normalize_tagger.py: must-keep candidate
  normalize_tag_llm.py: stress-only compat entrypoint
  qa_soft.py: compat-keep wrapper
  soft_qa_llm.py: compat-keep canonical
  runtime_adapter.py: must-keep core
blocked_zones:
  - scripts/repair_loop.py
  - scripts/repair_loop_v2.py
  - scripts/repair_checkpoint_gaps.py
  - scripts/run_validation.py
  - scripts/build_validation_set.py
  - gate/**
  - stress/**
  - ../src/scripts/**
risk_controls:
  - No physical deletion in Batch 3/4.
  - Governance artifacts must explain why frozen zones stay blocked and how they can be safely unfrozen later.
  - authority report may remain WARN on runtime_adapter drift, but must not add required mirror drift.
  - Cleanup roadmap may classify remote branches, but merge/delete actions stay deferred until Phase 3/4.
