delta_version: 0.3.0
change_id: deep-cleanup-main-batch6
change_type: repair-contract-retirement-and-metrics-rewire
status: in_progress
intent:
  summary: >
    Retire the repair-side governance contracts that kept two historical utilities blocked,
    and restore Metrics as a manifest-visible optional observability stage inside the smoke
    pipeline without changing the keep-chain pass/fail semantics.
  non_goals:
    - Reworking repair_loop.py, run_validation.py, or build_validation_set.py
    - Making Metrics a blocking smoke gate
    - Physically archiving repair_loop_v2.py or repair_checkpoint_gaps.py in this batch
    - Physically cleaning repo-root src/scripts
    - Altering the keep-chain runtime contract
assertions:
  authority_zone: main_worktree/scripts
  compat_zone: src/scripts
  keep_chain:
    - llm_ping
    - normalize_guard
    - translate_llm
    - qa_hard
    - rehydrate_export
    - smoke_verify
  minimal_irreversible_core:
    - scripts/run_smoke_pipeline.py
    - scripts/runtime_adapter.py
    - scripts/smoke_issue_logger.py
    - scripts/m4_3_collect_coverage.py
    - scripts/m4_4_decision.py
    - tests/test_smoke_verify.py
    - tests/test_qa_hard.py
    - tests/test_normalize_segmentation.py
planned_controls:
  - Retire active rule, inventory, and workflow references that still described repair_loop_v2.py and repair_checkpoint_gaps.py as current tools.
  - Add characterization tests for repair-side governance and optional metrics wiring before changing implementation.
  - Restore metrics only as a warning-capable optional stage whose artifacts are written into the run manifest.
  - Keep authority drift at WARN(runtime_adapter only) and keep M4 decision logic unchanged.
status_map:
  repair_loop_v2.py: archive-candidate after contract retirement
  repair_checkpoint_gaps.py: archive-candidate after contract retirement
  repair_loop.py: blocked
  run_validation.py: blocked
  build_validation_set.py: blocked
  runtime_adapter.py: must-keep core
  metrics_aggregator.py: optional observability surface
blocked_zones:
  - scripts/repair_loop.py
  - scripts/run_validation.py
  - scripts/build_validation_set.py
  - gate/**
  - stress/**
  - ../src/scripts/**
risk_controls:
  - Keep-chain scripts and blocked repair/validation surfaces remain untouched except for non-blocking metrics wiring in the orchestrator.
  - Metrics failures must only emit P2 warnings and must not change the smoke pipeline exit code on an otherwise healthy run.
  - Governance artifacts must explain that the two repair-side scripts are historical candidates pending later archive, not restored active tools.
  - authority report may remain WARN on runtime_adapter drift, but must not add required mirror drift.
  - M4 decision logic and smoke evidence generation remain unchanged.
