delta_version: 0.3.0
change_id: deep-cleanup-main-batch7
change_type: production-dev-recovery-validation-and-repair-authority
status: in_progress
intent:
  summary: >
    Restore the retained validation baseline and repair authority surfaces so the repo
    can return to sustainable production development, while keeping keep-chain, M4,
    authority drift, and optional Metrics semantics unchanged.
  non_goals:
    - Reworking repair_loop_v2.py or repair_checkpoint_gaps.py
    - Implementing true repair resume support in this batch
    - Making Metrics a blocking smoke gate
    - Physically cleaning repo-root src/scripts
    - Altering the keep-chain runtime contract
assertions:
  authority_zone: main_worktree/scripts
  compat_zone: src/scripts
  keep_chain:
    - llm_ping
    - normalize_guard
    - translate_llm
    - qa_hard
    - rehydrate_export
    - smoke_verify
  minimal_irreversible_core:
    - scripts/run_smoke_pipeline.py
    - scripts/runtime_adapter.py
    - scripts/smoke_issue_logger.py
    - scripts/m4_3_collect_coverage.py
    - scripts/m4_4_decision.py
    - tests/test_smoke_verify.py
    - tests/test_qa_hard.py
    - tests/test_normalize_segmentation.py
planned_controls:
  - Add deterministic validation tests for sampling, metadata schema, scoring, parse fallback, and explicit CLI paths before promoting the validation pair to must-keep.
  - Add deterministic repair tests for flags-only CLI, supported task formats, passthrough behavior, artifact output, and routing metadata before promoting repair_loop.py to must-keep.
  - Align runbooks and rules to the real script contracts rather than expanding scripts to fit stale docs.
  - Keep authority drift at WARN(runtime_adapter only), keep Metrics optional, and keep M4 decision logic unchanged.
status_map:
  repair_loop_v2.py: archive-candidate pending Batch 8 archive closeout
  repair_checkpoint_gaps.py: archive-candidate pending Batch 8 archive closeout
  repair_loop.py: must-keep retained repair authority
  run_validation.py: must-keep retained validation baseline
  build_validation_set.py: must-keep retained validation baseline generator
  runtime_adapter.py: must-keep core
  metrics_aggregator.py: optional observability surface
blocked_zones:
  - gate/**
  - stress/**
  - ../src/scripts/**
risk_controls:
  - Keep-chain scripts remain untouched except for already-established optional Metrics wiring.
  - Validation scoring, report schema, and artifact paths may only change with deterministic fixture updates and runbook alignment.
  - Repair docs must stop promising true resume support unless a later batch actually implements it.
  - Governance artifacts must explain that repair_loop_v2.py and repair_checkpoint_gaps.py remain archive-candidates pending Batch 8 physical closeout.
  - authority report may remain WARN on runtime_adapter drift, but must not add required mirror drift.
  - M4 decision logic and smoke evidence generation remain unchanged.
