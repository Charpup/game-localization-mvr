delta_version: 0.6.0
change_id: phase6-operator-workspace-dashboard
change_type: read-mostly-operator-workspace-over-phase5-runtime-shell
status: in_progress
intent:
  summary: >
    Add a read-mostly operator workspace dashboard on top of the accepted Phase 5 runtime shell
    by aggregating operator_control_plane artifacts and run truth sources into normalized workspace
    read models, local HTTP APIs, and dashboard panels.
  non_goals:
    - Writing back review-ticket, feedback-log, or card status from the UI
    - Replacing the artifact-first runtime model or keep-chain orchestration
    - Introducing a frontend build chain or framework migration
assertions:
  authority_zone: scripts
  compat_zone: src/scripts
  keep_chain:
    - llm_ping
    - normalize_guard
    - translate_llm
    - qa_hard
    - rehydrate_export
    - smoke_verify
  truth_sources:
    - run_manifest
    - smoke_verify
    - smoke_issues
    - review_ticket
    - feedback_log
    - kpi_report
    - operator_card
    - operator_summary
planned_controls:
  - Preserve all existing /api/runs* contracts and artifact allow-list behavior.
  - Split operator_control_plane into a pure derivation path and a write-on-demand summarize path.
  - Add normalized workspace read models and read-only /api/workspace/* endpoints.
  - Keep pending runs in the runtime lane only until manifest-backed operator context exists.
  - Freeze Phase 6 design, tasks, and PLC evidence in the same branch as the implementation slice.
status_map:
  scripts/operator_control_plane.py: must-keep operator aggregation authority with pure-derivation extension
  scripts/operator_ui_models.py: must-keep runtime and workspace view-model authority
  scripts/operator_ui_server.py: must-keep local HTTP adapter authority
  operator_ui/*: must-keep local operator shell surface
  ../src/scripts/**: compat-keep managed compatibility liability with separate exit program
blocked_zones: []
risk_controls:
  - Workspace GET paths must remain side-effect free and must not write operator artifacts implicitly.
  - Dashboard drilldown must reuse manifest-scoped artifact preview rather than arbitrary path browsing.
  - Existing Phase 5 runtime launcher and inspection behavior must remain intact while workspace panels are added.
  - Validation must cover derived vs persisted operator artifact parity, filter failure modes, and runtime/workspace mode switching.
