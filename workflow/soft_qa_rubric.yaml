---
# Soft QA Rubric v1.0
# 定义软质量评审维度，用于生成可执行的 repair tasks
# 注意：Soft QA 的价值不是"打分"，而是输出可执行的修复任务

version: 1
target: "ru-RU"

# 评审维度
dimensions:
  - key: terminology_consistency
    description: "术语是否遵守 glossary 与风格约束"
    severity: ["minor", "major"]
    examples:
      - "approved 术语未命中"
      - "命中禁译项但未进入人工确认"

  - key: style_contract
    description: "禁用语体、角色名策略、变量保护"
    severity: ["minor", "major"]
    examples:
      - "风格约束不符"
      - "角色名处理与约定冲突"

  - key: length
    description: "UI 按钮/长文长度约束，以及 UI-art 分类长度/行数预算"
    severity: ["minor", "major"]
    examples:
      - "行内文本超出 length 限制"
      - "未按模块上下文应用缩短策略"
      - "badge_micro_* 未压到 compact 预算"
      - "slogan_long 增加了行数预算"

  - key: placeholder
    description: "占位符与 token 完整性"
    severity: ["minor", "major"]
    examples:
      - "占位符丢失、重复或被改写"
      - "参数位序变化"

  - key: ambiguity_high_risk
    description: "高歧义词/术语映射风险"
    severity: ["minor", "major"]
    examples:
      - "同一中文术语对应多个俄文输出"
      - "改写导致语义偏移"

# 输出配置
outputs:
  report_json: "data/qa_soft_report.json"
  repair_tasks_jsonl: "data/repair_tasks.jsonl"

gate:
  enabled: true
  rule_id: "STEP1_TERM_STYLE_DRIFT"
  rule_version: "1.0"
  severity_threshold: "major"
  fail_on_types:
    - terminology
    - style_contract
    - length
    - placeholder
    - ambiguity_high_risk
  suggested_actions:
    terminology: "按 approved glossary 与 preferred_terms 修正术语；禁译项进入人工确认。"
    style_contract: "按 style_profile 的语体、专名、禁译规则修正后重跑。"
    length: "按 UI/对话长度上限压缩译文，避免静默截断。"
    placeholder: "恢复全部 token/标签后重跑，不允许改写变量。"
    ambiguity_high_risk: "收敛到保守且一致的译法，并补充 glossary 备注。"

# 使用说明
usage:
  script: "soft_qa_llm.py 使用此 rubric 进行 LLM 软质量评审"
  workflow: |
    1. 读取 translated.csv
    2. 先做 preflight 风格/术语/长度/占位符硬门禁检查
    3. 再按 batch 调用 LLM 评审高风险问题
    4. 输出 qa_soft_report.json (汇总)
    5. 输出 repair_tasks.jsonl (逐条任务)
  note: "Soft QA 对 style/terminology drifts 执行硬门禁；命中 gate 时返回非 0，并附修复建议。"
