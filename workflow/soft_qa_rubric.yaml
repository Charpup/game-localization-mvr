---
# Soft QA Rubric v1.0
# 定义软质量评审维度，用于生成可执行的 repair tasks
# 注意：Soft QA 的价值不是"打分"，而是输出可执行的修复任务

version: 1
target: "ru-RU"

# 评审维度
dimensions:
  - key: terminology_consistency
    description: "术语是否遵守 glossary 与风格约束"
    severity: ["minor", "major"]
    examples:
      - "approved 术语未命中"
      - "命中禁译项但未进入人工确认"

  - key: style_contract
    description: "禁用语体、角色名策略、变量保护"
    severity: ["minor", "major"]
    examples:
      - "风格约束不符"
      - "角色名处理与约定冲突"

  - key: length
    description: "UI 按钮/长文长度约束"
    severity: ["minor", "major"]
    examples:
      - "行内文本超出 length 限制"
      - "未按模块上下文应用缩短策略"

  - key: placeholder
    description: "占位符与 token 完整性"
    severity: ["minor", "major"]
    examples:
      - "占位符丢失、重复或被改写"
      - "参数位序变化"

  - key: ambiguity_high_risk
    description: "高歧义词/术语映射风险"
    severity: ["minor", "major"]
    examples:
      - "同一中文术语对应多个俄文输出"
      - "改写导致语义偏移"

# 输出配置
outputs:
  report_json: "data/qa_soft_report.json"
  repair_tasks_jsonl: "data/repair_tasks.jsonl"

# 使用说明
usage:
  script: "soft_qa_llm.py 使用此 rubric 进行 LLM 软质量评审"
  workflow: |
    1. 读取 translated.csv
    2. 按 batch 调用 LLM 评审
    3. 输出 qa_soft_report.json (汇总)
    4. 输出 repair_tasks.jsonl (逐条任务)
  note: "Soft QA 不阻断流程，但会驱动 repair loop 自动修复"
