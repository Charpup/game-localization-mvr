version: "1.0"
artifact: "review_ticket"
storage_defaults:
  refresh_executor: "data/incremental_review_tickets.jsonl"
  smoke_pipeline: "data/<run_id>/smoke_review_tickets.jsonl"
required_fields:
  - "ticket_id"
  - "task_id"
  - "string_id"
  - "target_locale"
  - "ticket_type"
  - "priority"
  - "review_owner"
  - "review_status"
  - "review_source"
  - "queue_reason"
  - "current_target"
  - "reason_codes"
  - "content_class"
  - "risk_level"
  - "created_at"
  - "source_artifacts"
ticket_type_enum:
  - "manual_review"
  - "execution_failure"
  - "gate_blocked"
  - "quality_warning"
priority_enum:
  - "P0"
  - "P1"
  - "P2"
review_status_enum:
  - "pending"
  - "acknowledged"
  - "in_review"
  - "approved"
  - "rejected"
  - "superseded"
  - "closed"
